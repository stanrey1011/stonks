name: "Bollinger + RSI"
description: "Buy when price below lower band AND RSI oversold. Sell when above upper band OR RSI overbought."
indicators:
  bollinger:
    enabled: true
    params:
      window: 20
      num_std_dev: 2
  rsi:
    enabled: true
    params:
      period: 14
      overbought: 65
      oversold: 35
  macd:
    enabled: false
  ma_double:
    enabled: false
patterns:
  doubles:
    enabled: false
  triangles:
    enabled: false
  head_shoulders:
    enabled: false
risk:
  start_cash: 10000
  risk_per_trade: 0.2
  stop_loss_pct: 0.08
  slippage: 0.0005
