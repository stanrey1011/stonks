# Complete stack for stonks. Build-based (no registry needed):
#
#   git clone https://github.com/stanrey1011/stonks && cd stonks
#   cp .env.example .env          # add API keys (optional; runs on market data without them)
#   docker compose up -d --build  # dashboard at http://localhost:8501
#
# Source is baked into the image at build time, so update with `up -d --build`.
# `docker-compose.override.yml` (auto-merged by plain `docker compose up`) bind-mounts
# the working tree for live dev — edit + restart, no rebuild.
#
# To later serve from a published image instead of building: uncomment the `image:`
# lines below (pointing at GHCR) and run `docker compose pull && up -d` — no source clone
# needed by the installer.
#
# ── Toggling functions per host (dev vs prod) ─────────────────────────────────
# stonks-dash always runs. The scheduled batch jobs (pipeline/alert/optimize) run in
# stonks-scheduler, which is gated behind the `scheduler` profile so a dev box doesn't
# duplicate cron side-effects (double API calls, double Discord posts, LLM load).
#   Dashboard only (dev, e.g. anton):  docker compose up -d           # no scheduler
#   Full stack (prod, e.g. .208):      COMPOSE_PROFILES=scheduler in .env, then up -d
#                                       (or: docker compose --profile scheduler up -d)
# Other functions are env-var toggles in .env: STONKS_DISCORD_WEBHOOK (alerts on/off),
# ALPACA_PAPER (paper vs live), LLM_BASE_URL (OpenAI-compatible LLM endpoint, e.g.
# llama.cpp at http://10.11.87.91:8089/v1; falls back to OLLAMA_HOST + /v1 if unset).
services:

  stonks-dash:
    build: .
    image: stonks:latest
    # image: ghcr.io/stanrey1011/stonks:latest   # ← swap to this once published (drop `build:`)
    container_name: stonks-dash
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - stonks-data:/app/data
      - stonks-log:/app/log
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  stonks-scheduler:
    build: .
    image: stonks:latest
    # image: ghcr.io/stanrey1011/stonks:latest   # ← swap to this once published (drop `build:`)
    container_name: stonks-scheduler
    # Gated: only starts when the `scheduler` profile is active (COMPOSE_PROFILES=scheduler
    # in .env, or `--profile scheduler`). Keeps dev boxes from running duplicate cron jobs.
    profiles: ["scheduler"]
    init: true
    env_file: .env
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - stonks-data:/app/data
      - stonks-log:/app/log
    command: supercronic /app/docker/crontab
    restart: unless-stopped

  # DISABLED: Discord bot — re-enable or replace with Matrix notification backend
  # stonks-bot:
  #   build: .
  #   image: stonks:latest
  #   container_name: stonks-bot
  #   env_file: .env
  #   environment:
  #     - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   volumes:
  #     - stonks-data:/app/data
  #     - stonks-log:/app/log
  #   command: stonks bot
  #   restart: unless-stopped

volumes:
  stonks-data:
  stonks-log:
